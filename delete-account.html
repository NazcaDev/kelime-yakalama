<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talep Alındı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            max-width: 520px;
            width: 100%;
            padding: 50px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10);
            text-align: center;
        }

        .icon {
            font-size: 72px;
            display: block;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            color: #1a2b4c;
            margin-bottom: 12px;
        }

        p {
            color: #5e6f8d;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .button {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 36px;
            background: #1a2b4c;
            color: #ffffff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            transition: background 0.25s;
        }

        .button:hover {
            background: #0f1e38;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">✅</span>
        <h1>Teşekkürler!</h1>
        <p>Hesap silme talebiniz başarıyla iletilmiştir.</p>
        <p>En kısa sürede tarafınıza dönüş yapılacaktır.</p>
        <a href="delete-account.html" class="button">← Ana Sayfaya Dön</a>
    </div>
</body>
</html>
